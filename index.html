<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPS Player's Passport 시스템 (11 Pages)</title>

    <!-- 프리텐다드 폰트 -->
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <!-- Tailwind CSS & KFA Custom Colors Configuration -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        kfa: {
                            blue: '#00145A',
                            red: '#E6002D',
                            gold: '#B3995D',
                            black: '#1A1A1A'
                        }
                    }
                }
            }
        }
    </script>

    <!-- Import Map -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "recharts": "https://esm.sh/recharts@2.12.0?deps=react@18.2.0,react-dom@18.2.0",
        "lucide-react": "https://esm.sh/lucide-react@0.359.0?deps=react@18.2.0"
      }
    }
    </script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- html2pdf 라이브러리 추가 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" xintegrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
            color: #1e293b;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        /* A4 Print Layout 최적화 */
        .a4-page {
            width: 210mm;
            height: 297mm;
            margin: 0 auto 2rem auto;
            background: #ffffff; /* 모든 페이지 완벽한 흰색 바탕 */
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            position: relative;
            overflow: hidden;
            box-sizing: border-box;
            padding: 20mm 15mm;
            border: 1px solid #e2e8f0;
        }

        /* 표지 전용 레이아웃 (패딩 제거 및 전체 채우기) */
        .cover-page {
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        /* PDF 추출 시 적용되는 스타일 */
        .pdf-exporting {
            gap: 0 !important;
        }
        .pdf-exporting .a4-page {
            margin: 0 !important;
            box-shadow: none !important;
            border: none !important;
            border-radius: 0 !important;
        }

        @page {
            size: A4 portrait;
            margin: 0;
        }

        @media print {
            body { background-color: #ffffff; }
            .no-print { display: none !important; }
            .a4-page {
                margin: 0;
                box-shadow: none;
                border: none;
                page-break-after: always;
                page-break-inside: avoid;
            }
            .a4-page:last-child {
                page-break-after: auto;
            }
        }

        /* 스크롤바 커스텀 */
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f8fafc; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        .circular-progress { transition: stroke-dashoffset 0.8s ease-in-out; }
        
        .section-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: #00145A; /* KFA Blue 적용 */
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* 인쇄 및 편집 가능한 textarea 스타일 */
        .editable-textarea {
            width: 100%;
            resize: none;
            border: 1px dashed #cbd5e1;
            background-color: #f8fafc;
            border-radius: 0.5rem;
            padding: 0.75rem;
            outline: none;
            transition: all 0.2s;
            font-family: inherit;
        }
        .editable-textarea:focus {
            border-color: #00145A;
            background-color: #ffffff;
            box-shadow: 0 0 0 2px rgba(0, 20, 90, 0.1);
        }
        @media print {
            .editable-textarea {
                border: none !important;
                background-color: transparent !important;
                padding: 0 !important;
                resize: none !important;
                box-shadow: none !important;
                overflow: hidden !important;
            }
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { 
            ResponsiveContainer, Radar, RadarChart, PolarGrid, PolarAngleAxis, PolarRadiusAxis,
            LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, BarChart, Bar, Cell
        } from 'recharts';
        import { 
            Settings, Printer, Brain, Activity, TrendingUp, ShieldAlert, CheckCircle2, 
            AlertTriangle, Info, Zap, Heart, RefreshCw, ChevronDown, ChevronUp, User, Users, BookOpen, Target,
            Stethoscope, CalendarDays, ShieldCheck, Flame
        } from 'lucide-react';

        // --- Mock Data & Initial State (All Fields Included) ---
        const INITIAL_DATA = {
            profile: {
                name: '이해온',
                birth: '2012-05-20',
                testDate: '2026-03-08',
                doctorName: '이정욱 원장',
                team: '대동초 U-14 유스',
                gender: 'male',
                height: 158.5,
                weight: 48.2
            },
            mental: { 
                mgi: 4.2,
                // 5 Core
                tension: 3.5, support: 4.5, prep: 4.0, recovery: 4.8, focus: 3.8,
                // 8 Extra Indices
                stability: 3.5, psychology: 3.8, independence: 4.2, 
                srl: 4.1, imagery: 3.4, social: 4.5, resilience: 4.8, attitude: 4.3
            },
            physical: {
                // BWA
                ecwRatio: 0.386, bodyFat: 12.5,
                // HRV A
                regulation: 4.34, balance: 18.95, physicalStress: 43.33,
                // HRV B
                mentalStress: 0.23, fatigue: 4.33, stability: 6.07,
                // Ultrasound (L/R)
                usAchillesL: 'GREEN', usAchillesR: 'GREEN',
                usPatellarL: 'YELLOW', usPatellarR: 'ORANGE',
                usPlantarL: 'GREEN', usPlantarR: 'GREEN'
            },
            growth: {
                boneAgeYear: 13, boneAgeMonth: 6,
                fatherHeight: 175, motherHeight: 162,
                phase: 'Stage 2 (PHV)',
                pah: 178.2
            },
            comments: {
                hrv: "현재 피로도 지수가 권장치를 초과하였으며 자율신경계가 훈련 부하를 소화하는 데 어려움을 겪고 정적인 폼롤러 스트레칭과 수면의 질(시간 및 환경) 개선이 강력히 요구됩니다.",
                us: "무릎(슬개건) 부위에 에코 저하 현상이 관찰됩니다. 이는 뼈가 자라는 속도를 근육과 인대가 따라가지 못해 발생하는 급성장기 특유의 견인성 염증의 초기 증상일 수 있습니다. 점프 후 착지 훈련 비중을 줄이고 대퇴사두근 폼롤링을 매일 10분 이상 실시하십시오.",
                bwa: "키와 체중의 비율(BMI)이 표준 범위 내에 있어 신체 밸런스가 좋습니다. 급성장기에 필요한 단백질과 칼슘(우유, 치즈) 섭취만 잘 유지해 주십시오.",
                guide: "현재의 영양 상태와 수면 패턴이 매우 좋습니다. 성장통 여부만 꾸준히 체크해 주십시오.",
                mental: "강한 회복 탄력성과 긍정적인 사고방식을 지녔습니다. 위기 상황에서도 쉽게 무너지지 않는 것이 가장 큰 무기입니다. 다만 긴장 관리 루틴만 보완된다면 더 완벽한 퍼포먼스를 낼 수 있습니다.",
                physical: "급성장기에 진입한 상태에서 신체 부하가 매우 높게 나타납니다. '청소년기 어색함(Awkwardness)'으로 인해 일시적으로 움직임이 둔탁해 보일 수 있으나 기량 저하가 아닙니다. 현재는 무릎/발목 건염 예방이 최우선입니다."
            }
        };

        // --- Utility Components ---
        const CircularGauge = ({ value, label, max = 100, reverseColor = false, unit="" }) => {
            const radius = 36;
            const circumference = 2 * Math.PI * radius;
            const boundedValue = Math.max(0, Math.min(max, value));
            const strokeDashoffset = circumference - (boundedValue / max) * circumference;
            
            // 에너지 넘치는 컬러톤으로 조정
            let color = '#10b981'; // Emerald 500
            if (reverseColor) {
                if (value > max*0.66) color = '#E6002D'; // KFA Red
                else if (value > max*0.33) color = '#f59e0b'; // Amber 500
            } else {
                if (value < max*0.33) color = '#E6002D'; // KFA Red
                else if (value < max*0.66) color = '#f59e0b'; // Amber 500
            }

            return (
                <div className="flex flex-col items-center">
                    <div className="relative flex items-center justify-center w-24 h-24 mb-2">
                        <svg className="transform -rotate-90 w-full h-full">
                            <circle cx="48" cy="48" r={radius} stroke="#f1f5f9" strokeWidth="8" fill="none" />
                            <circle cx="48" cy="48" r={radius} stroke={color} strokeWidth="8" fill="none"
                                strokeDasharray={circumference} strokeDashoffset={strokeDashoffset} strokeLinecap="round" className="circular-progress" />
                        </svg>
                        <div className="absolute text-xl font-bold text-kfa-blue">{value.toFixed(1)}{unit}</div>
                    </div>
                    <span className="text-sm font-bold text-slate-600">{label}</span>
                </div>
            );
        };

        // Header 디자인에 KFA Blue 신뢰감 추가
        const PageHeader = ({ title, pageNum, profile }) => (
            <div className="flex justify-between items-end border-b-4 border-kfa-blue pb-4 mb-8">
                <div>
                    <div className="text-sm font-bold text-slate-400 uppercase tracking-widest mb-1">MPS Player's Passport</div>
                    <h1 className="text-3xl font-black text-kfa-blue">{title}</h1>
                </div>
                <div className="text-right">
                    <div className="text-sm font-bold text-slate-600">{profile.name} 선수 ({profile.team})</div>
                    <div className="text-xs text-slate-400 mt-1">검사일: {profile.testDate} | Page {pageNum}/10</div>
                </div>
            </div>
        );

        // --- Pages ---

        // PAGE 0: Cover Page (표지)
        const PageCover = ({ data }) => {
            const { name, birth, testDate, team, doctorName } = data.profile;
            return (
                <div className="a4-page cover-page bg-white relative">
                    {/* 생기발랄한 배경 악센트 (Sky/Cyan 톤) */}
                    <div className="absolute top-0 right-0 w-96 h-96 bg-gradient-to-bl from-sky-100 to-transparent rounded-bl-full -z-10 opacity-80"></div>
                    <div className="absolute bottom-0 left-0 w-80 h-80 bg-gradient-to-tr from-rose-50 to-transparent rounded-tr-full -z-10 opacity-80"></div>
                    
                    {/* Header Section */}
                    <div className="pt-24 px-16">
                        <div className="flex items-center gap-3 text-kfa-blue font-black tracking-[0.2em] mb-6">
                            <ShieldCheck size={28} className="text-kfa-red" />
                            MPS REPORT
                        </div>
                        {/* KFA Blue 메인 타이틀 */}
                        <h1 className="text-[4rem] font-black text-kfa-blue leading-[1.1] mb-8">{name} 님<br/>Player's Passport</h1>
                        {/* KFA Red 에너지 라인 */}
                        <div className="w-32 h-3 bg-kfa-red mb-10 rounded-full"></div>
                        <p className="text-2xl text-slate-600 font-medium break-keep leading-relaxed max-w-2xl">
                            유소년 스포츠 선수의 지속적인 성장을 위한 <br/>
                            <span className="font-bold text-kfa-red">심리, 피지컬, 성장 및 부상 리스크</span> 통합 분석 리포트입니다.
                        </p>
                    </div>

                    {/* MPS Explanation Section (아이들 느낌의 생기발랄한 컬러 적용) */}
                    <div className="px-16 py-16 flex-1 flex flex-col justify-center gap-8">
                        {/* Mental (Sky Blue) */}
                        <div className="flex gap-6 items-start">
                            <div className="w-14 h-14 flex items-center justify-center rounded-2xl bg-sky-100 text-sky-500 flex-shrink-0 shadow-sm border border-sky-200">
                                <span className="text-2xl font-black">M</span>
                            </div>
                            <div>
                                <h3 className="text-xl font-bold text-kfa-blue mb-2 flex items-center gap-2">
                                    <Brain size={20} className="text-sky-500" /> Mental Performance
                                </h3>
                                <p className="text-base text-slate-600 leading-relaxed break-keep">
                                    선수의 경기 긴장 관리, 회복 탄력성, 집중력 등 경기력에 직접적인 영향을 미치는 심리적 요인과 멘탈 역량을 다각도로 분석하여 강력한 멘탈리티 구축을 돕습니다.
                                </p>
                            </div>
                        </div>

                        {/* Physical (Rose/KFA Red tone) */}
                        <div className="flex gap-6 items-start">
                            <div className="w-14 h-14 flex items-center justify-center rounded-2xl bg-rose-100 text-kfa-red flex-shrink-0 shadow-sm border border-rose-200">
                                <span className="text-2xl font-black">P</span>
                            </div>
                            <div>
                                <h3 className="text-xl font-bold text-kfa-blue mb-2 flex items-center gap-2">
                                    <Flame size={20} className="text-kfa-red" /> Physical & Risk
                                </h3>
                                <p className="text-base text-slate-600 leading-relaxed break-keep">
                                    자율신경계(HRV) 스트레스 분석, 체성분 균형 판독, 주요 관절/건 초음파 검사를 통해 눈에 보이지 않는 누적 피로도와 잠재적 부상 위험을 조기에 진단합니다.
                                </p>
                            </div>
                        </div>

                        {/* Somatic / Growth (Emerald) */}
                        <div className="flex gap-6 items-start">
                            <div className="w-14 h-14 flex items-center justify-center rounded-2xl bg-emerald-100 text-emerald-500 flex-shrink-0 shadow-sm border border-emerald-200">
                                <span className="text-2xl font-black">S</span>
                            </div>
                            <div>
                                <h3 className="text-xl font-bold text-kfa-blue mb-2 flex items-center gap-2">
                                    <TrendingUp size={20} className="text-emerald-500" /> Stage of Growth
                                </h3>
                                <p className="text-base text-slate-600 leading-relaxed break-keep">
                                    골연령(뼈 나이) 판독과 체격 데이터를 기반으로 현재의 성장 단계(Biological Maturation)를 파악하고, 최종 신장 예측 및 시기별 맞춤형 훈련 가이드를 제공합니다.
                                </p>
                            </div>
                        </div>
                    </div>

                    {/* Footer Info Box (글씨 크기 및 패딩 축소) */}
                    <div className="bg-slate-50 p-6 mt-auto border-t-4 border-kfa-blue">
                        <div className="grid grid-cols-2 gap-4 items-end">
                            <div>
                                <div className="text-xl font-black text-kfa-blue mb-1">{name} <span className="text-sm font-bold text-slate-600">선수</span></div>
                                <div className="text-sm text-slate-600 font-medium mb-1">{team}</div>
                                <div className="text-xs text-slate-500">생년월일: {birth}</div>
                            </div>
                            <div className="text-right border-l-2 border-slate-200 pl-4">
                                <div className="text-[10px] font-bold text-slate-400 mb-2 tracking-wider flex items-center justify-end gap-1">
                                    <CalendarDays size={12} /> HAEON K-MEDI CLINIC
                                </div>
                                <div className="text-sm font-bold text-kfa-blue mb-1">검사일자: {testDate}</div>
                                <div className="text-sm font-bold text-kfa-blue flex items-center justify-end gap-1">
                                    <Stethoscope size={14} className="text-kfa-red" /> 담당 의료진: {doctorName}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // PAGE 1: M-Test Overview (Mental 테마: Sky Blue + KFA Blue)
        const Page1Mental = ({ data }) => {
            const chartData = [
                { subject: '긴장 관리', A: data.mental.tension, fullMark: 6, desc: '경기긴장 및 멘탈압박 대응 능력' },
                { subject: '지원 환경', A: data.mental.support, fullMark: 6, desc: '팀 주변 지원환경' },
                { subject: '준비 능력', A: data.mental.prep, fullMark: 6, desc: '경기준비 이미지트레이닝 능력' },
                { subject: '회복력', A: data.mental.recovery, fullMark: 6, desc: '실수 후 멘탈 회복 능력' },
                { subject: '자기조절', A: data.mental.focus, fullMark: 6, desc: '경기 집중, 자기 관리 능력' },
            ];
            return (
                <div className="a4-page">
                    <PageHeader title="1. 멘탈 퍼포먼스 요약 (M-Test)" pageNum="1" profile={data.profile} />
                    
                    <div className="bg-sky-50 border border-sky-200 p-4 rounded-xl text-xs text-slate-700 mb-6 flex items-center justify-center gap-2">
                        <Info size={15} className="text-sky-500"/>
                        <strong className="text-kfa-blue">유럽 유소년 엘리트 평가 기준:</strong> 4.8 이상 (매우 우수) | 4.2 ~ 4.7 (양호) | 3.6 ~ 4.1 (보통) | 3.0 ~ 3.5 (개선 필요) | 3.0 미만 (위험)
                    </div>

                    <h2 className="section-title"><Brain className="text-sky-500" /> 멘탈 종합 지수 (MGI)</h2>
                    
                    <div className="grid grid-cols-2 gap-8 items-center h-[240px] bg-white rounded-2xl p-8 mb-8 border border-slate-200 shadow-sm">
                        <div>
                            <div className="text-sm font-bold text-sky-500 uppercase tracking-widest mb-2">Mental Growth Index</div>
                            <div className="text-7xl font-black text-kfa-blue">{data.mental.mgi.toFixed(1)}<span className="text-2xl text-slate-400">/6.0</span></div>
                            <p className="text-sm text-slate-600 mt-4 leading-relaxed break-keep">
                                선수가 앞으로 얼마나 멘탈적으로 성장할 잠재력이 있는지 보여주는 핵심 지표입니다. 4.0 이상은 우수한 잠재력을 의미합니다.
                            </p>
                        </div>
                        <div className="h-full">
                            <ResponsiveContainer width="100%" height="100%">
                                <RadarChart cx="50%" cy="50%" outerRadius="70%" data={chartData}>
                                    <PolarGrid stroke="#e2e8f0" />
                                    <PolarAngleAxis dataKey="subject" tick={{ fill: '#00145A', fontSize: 13, fontWeight: 'bold' }} />
                                    <PolarRadiusAxis angle={30} domain={[0, 6]} tick={false} axisLine={false} />
                                    {/* KFA 테마를 반영한 레이더 차트 (테두리는 신뢰감, 속은 발랄함) */}
                                    <Radar name="선수" dataKey="A" stroke="#00145A" fill="#38bdf8" fillOpacity={0.4} strokeWidth={3} />
                                </RadarChart>
                            </ResponsiveContainer>
                        </div>
                    </div>

                    <h3 className="text-lg font-bold text-kfa-blue mb-4">5대 핵심 멘탈 지표</h3>
                    <div className="space-y-4">
                        {chartData.map((item, idx) => (
                            <div key={idx} className="flex flex-col bg-white border border-slate-200 p-3 rounded-xl shadow-sm">
                                <div className="flex items-center gap-4 mb-2">
                                    <div className="w-24 font-bold text-slate-700 text-sm">{item.subject}</div>
                                    <div className="flex-1 h-3 bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full bg-sky-400 rounded-full" style={{ width: `${(item.A / 6) * 100}%` }}></div>
                                    </div>
                                    <div className="w-16 text-right font-black text-kfa-blue">{item.A.toFixed(1)} <span className="text-xs text-slate-400 font-normal">/6.0</span></div>
                                </div>
                                <div className="pl-28 text-[11px] text-slate-500">{item.desc}</div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-8 pt-8 border-t border-slate-200 text-center bg-slate-50 rounded-2xl p-6 flex-shrink-0">
                        <div className="text-lg font-bold text-kfa-blue mb-2">다음 방문 안내 (Next Step)</div>
                        <p className="text-slate-600 mb-6 flex items-center justify-center gap-2">
                             
                            <strong className="text-white bg-kfa-blue px-4 py-1.5 rounded-full flex items-center gap-1 shadow-sm">
                                예상 일정 {getNextEvaluationDate(data.profile.testDate)} 정기 평가를 권장합니다. 
                            </strong>
                            
                        </p>
                        <p className="text-[11px] text-slate-400">본 리포트는 M-Test(심리), P-Test(생리), S-Test(성숙도) 데이터를 통합 분석한 결과입니다. 본 평가 결과는 의학적 진단을 대신할 수 없으며, 구체적인 질병에 관한 소견은 반드시 의료기관의 의료진과 상담하십시오.</p>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            const [data, setData] = useState(INITIAL_DATA);
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [isPrinting, setIsPrinting] = useState(false); // 인쇄 상태 추가

            // Handle Nested Input
            const handleInputChange = (section, field, value) => {
                setData(prev => {
                    let parsedValue = value;
                    if (!['name', 'birth', 'testDate', 'doctorName', 'team', 'gender', 'phase', 'usAchillesL', 'usAchillesR', 'usPatellarL', 'usPatellarR', 'usPlantarL', 'usPlantarR'].includes(field)) {
                        parsedValue = value === '' ? '' : Number(value);
                    }
                    return {
                        ...prev,
                        [section]: { ...prev[section], [field]: parsedValue }
                    };
                });
            };

            const handlePrint = () => {
                if (typeof window.html2pdf === 'undefined') {
                    alert('PDF 라이브러리를 불러오는 중입니다. 잠시 후 다시 시도해주세요.');
                    return;
                }

                setIsPrinting(true);
                const element = document.querySelector('.report-container');
                element.classList.add('pdf-exporting');

                const opt = {
                    margin: 0,
                    filename: `${data.profile.name}_MPS_Passport.pdf`,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, scrollY: 0 },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
                };

                window.html2pdf().set(opt).from(element).save().then(() => {
                    element.classList.remove('pdf-exporting');
                    setIsPrinting(false);
                }).catch(err => {
                    console.error('PDF 생성 오류:', err);
                    element.classList.remove('pdf-exporting');
                    setIsPrinting(false);
                    alert('PDF 생성 중 오류가 발생했습니다.');
                });
            };

            return (
                <div className="min-h-screen bg-slate-200 py-8">
                    {/* Top Control Bar (No Print) */}
                    <div className="max-w-6xl mx-auto mb-8 no-print bg-white p-6 rounded-2xl shadow-lg border border-slate-200 transition-all duration-300">
                        <div className="flex justify-between items-center border-b border-slate-100 pb-4">
                            <div>
                                <h1 className="text-2xl font-black text-kfa-blue flex items-center gap-2"><Settings className="text-kfa-red"/> 데이터 통합 입력 패널</h1>
                                <p className="text-sm text-slate-500 mt-1">M, P, S 각 테스트 결과를 입력하면 표지와 하단 10페이지 리포트에 실시간 반영됩니다.</p>
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => setIsFormOpen(!isFormOpen)} className="px-5 py-2.5 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition-colors flex items-center gap-2">
                                    {isFormOpen ? <><ChevronUp size={18}/> 폼 닫기</> : <><ChevronDown size={18}/> 데이터 입력하기</>}
                                </button>
                                <button 
                                    onClick={handlePrint} 
                                    disabled={isPrinting}
                                    className="px-6 py-2.5 bg-kfa-blue text-white font-bold rounded-xl hover:opacity-90 transition-opacity flex items-center gap-2 shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
                                    <Printer size={18}/> {isPrinting ? 'PDF 생성 중...' : '11 Pages PDF 다운로드'}
                                </button>
                            </div>
                        </div>

                        {/* Input Form Content */}
                        {isFormOpen && (
                            <div className="mt-6 max-h-[60vh] overflow-y-auto custom-scrollbar pr-2 space-y-6">
                                {/* Row 1: Profile & Growth */}
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="bg-slate-50 p-5 rounded-xl border border-slate-200">
                                        <h3 className="font-bold text-kfa-blue mb-3 border-b pb-2">기본 프로필</h3>
                                        <div className="grid grid-cols-3 gap-3">
                                            <div><label className="text-[11px] text-slate-500 block mb-1">이름</label><input type="text" className="w-full p-2 rounded border text-sm focus:border-kfa-blue outline-none" value={data.profile.name} onChange={e => handleInputChange('profile', 'name', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-slate-500 block mb-1">성별</label><select className="w-full p-2 rounded border text-sm" value={data.profile.gender} onChange={e => handleInputChange('profile', 'gender', e.target.value)}><option value="male">남아</option><option value="female">여아</option></select></div>
                                            <div><label className="text-[11px] text-slate-500 block mb-1">소속팀</label><input type="text" className="w-full p-2 rounded border text-sm" value={data.profile.team} onChange={e => handleInputChange('profile', 'team', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-slate-500 block mb-1">생년월일</label><input type="date" className="w-full p-2 rounded border text-sm" value={data.profile.birth} onChange={e => handleInputChange('profile', 'birth', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-slate-500 block mb-1">검사일</label><input type="date" className="w-full p-2 rounded border text-sm" value={data.profile.testDate} onChange={e => handleInputChange('profile', 'testDate', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-kfa-red block mb-1 font-bold">담당 의료진</label><input type="text" className="w-full p-2 rounded border-2 border-kfa-red/30 text-sm font-bold" value={data.profile.doctorName} onChange={e => handleInputChange('profile', 'doctorName', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-slate-500 block mb-1">현재 신장(cm)</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.profile.height} onChange={e => handleInputChange('profile', 'height', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-slate-500 block mb-1">현재 체중(kg)</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.profile.weight} onChange={e => handleInputChange('profile', 'weight', e.target.value)} /></div>
                                        </div>
                                    </div>
                                    <div className="bg-emerald-50 p-5 rounded-xl border border-emerald-200">
                                        <h3 className="font-bold text-emerald-800 mb-3 border-b border-emerald-200 pb-2">S-Test (성장/골연령)</h3>
                                        <div className="grid grid-cols-3 gap-3">
                                            <div><label className="text-[11px] text-emerald-600 block mb-1">뼈나이(년)</label><input type="number" className="w-full p-2 rounded border text-sm" value={data.growth.boneAgeYear} onChange={e => handleInputChange('growth', 'boneAgeYear', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-emerald-600 block mb-1">뼈나이(개월)</label><input type="number" className="w-full p-2 rounded border text-sm" value={data.growth.boneAgeMonth} onChange={e => handleInputChange('growth', 'boneAgeMonth', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-emerald-600 block mb-1">성장 단계</label>
                                                <select className="w-full p-2 rounded border text-sm" value={data.growth.phase} onChange={e => handleInputChange('growth', 'phase', e.target.value)}>
                                                    <option>Pre-PHV</option><option>Stage 1 (가속기)</option><option>Stage 2 (PHV)</option><option>Stage 3 (감속기)</option><option>Stage 4</option><option>Stage 5</option>
                                                </select>
                                            </div>
                                            <div><label className="text-[11px] text-emerald-600 block mb-1">부 키(cm)</label><input type="number" className="w-full p-2 rounded border text-sm" value={data.growth.fatherHeight} onChange={e => handleInputChange('growth', 'fatherHeight', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-emerald-600 block mb-1">모 키(cm)</label><input type="number" className="w-full p-2 rounded border text-sm" value={data.growth.motherHeight} onChange={e => handleInputChange('growth', 'motherHeight', e.target.value)} /></div>
                                            <div><label className="text-[11px] text-emerald-600 block mb-1">예측키 PAH(cm)</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm font-bold text-emerald-700" value={data.growth.pah} onChange={e => handleInputChange('growth', 'pah', e.target.value)} /></div>
                                        </div>
                                    </div>
                                </div>

                                {/* Row 2: M-Test */}
                                <div className="bg-sky-50 p-5 rounded-xl border border-sky-200">
                                    <h3 className="font-bold text-kfa-blue mb-3 border-b border-sky-200 pb-2">M-Test (멘탈 평점 1~6)</h3>
                                    <div className="grid grid-cols-5 gap-3 mb-4">
                                        <div><label className="text-[11px] font-bold text-sky-600 block mb-1">MGI (성장지수)</label><input type="number" step="0.1" className="w-full p-2 rounded border-2 border-sky-300 text-sm font-bold" value={data.mental.mgi} onChange={e => handleInputChange('mental', 'mgi', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-sky-600 block mb-1">긴장 관리</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.mental.tension} onChange={e => handleInputChange('mental', 'tension', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-sky-600 block mb-1">지원 환경</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.mental.support} onChange={e => handleInputChange('mental', 'support', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-sky-600 block mb-1">준비 능력</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.mental.prep} onChange={e => handleInputChange('mental', 'prep', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-sky-600 block mb-1">집중/조절</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.mental.focus} onChange={e => handleInputChange('mental', 'focus', e.target.value)} /></div>
                                    </div>
                                    <div className="grid grid-cols-8 gap-2">
                                        <div><label className="text-[10px] text-slate-500 block">안정성</label><input type="number" step="0.1" className="w-full p-1.5 rounded border text-xs" value={data.mental.stability} onChange={e => handleInputChange('mental', 'stability', e.target.value)} /></div>
                                        <div><label className="text-[10px] text-slate-500 block">심리</label><input type="number" step="0.1" className="w-full p-1.5 rounded border text-xs" value={data.mental.psychology} onChange={e => handleInputChange('mental', 'psychology', e.target.value)} /></div>
                                        <div><label className="text-[10px] text-slate-500 block">독립성</label><input type="number" step="0.1" className="w-full p-1.5 rounded border text-xs" value={data.mental.independence} onChange={e => handleInputChange('mental', 'independence', e.target.value)} /></div>
                                        <div><label className="text-[10px] text-slate-500 block">학습(SRL)</label><input type="number" step="0.1" className="w-full p-1.5 rounded border text-xs" value={data.mental.srl} onChange={e => handleInputChange('mental', 'srl', e.target.value)} /></div>
                                        <div><label className="text-[10px] text-slate-500 block">심상훈련</label><input type="number" step="0.1" className="w-full p-1.5 rounded border text-xs" value={data.mental.imagery} onChange={e => handleInputChange('mental', 'imagery', e.target.value)} /></div>
                                        <div><label className="text-[10px] text-slate-500 block">적응력</label><input type="number" step="0.1" className="w-full p-1.5 rounded border text-xs" value={data.mental.social} onChange={e => handleInputChange('mental', 'social', e.target.value)} /></div>
                                        <div><label className="text-[10px] text-slate-500 block">회복력</label><input type="number" step="0.1" className="w-full p-1.5 rounded border text-xs" value={data.mental.resilience} onChange={e => handleInputChange('mental', 'resilience', e.target.value)} /></div>
                                        <div><label className="text-[10px] text-slate-500 block">태도</label><input type="number" step="0.1" className="w-full p-1.5 rounded border text-xs" value={data.mental.attitude} onChange={e => handleInputChange('mental', 'attitude', e.target.value)} /></div>
                                    </div>
                                </div>

                                {/* Row 3: P-Test */}
                                <div className="bg-rose-50 p-5 rounded-xl border border-rose-200">
                                    <h3 className="font-bold text-kfa-red mb-3 border-b border-rose-200 pb-2">P-Test (피지컬)</h3>
                                    <div className="grid grid-cols-6 gap-3 mb-4">
                                        <div><label className="text-[11px] text-rose-600 block mb-1">ECW Ratio</label><input type="number" step="0.001" className="w-full p-2 rounded border text-sm" value={data.physical.ecwRatio} onChange={e => handleInputChange('physical', 'ecwRatio', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-rose-600 block mb-1">체지방률(%)</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.physical.bodyFat} onChange={e => handleInputChange('physical', 'bodyFat', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-rose-600 block mb-1">HRV 조절</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.physical.regulation} onChange={e => handleInputChange('physical', 'regulation', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-rose-600 block mb-1">HRV 균형</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.physical.balance} onChange={e => handleInputChange('physical', 'balance', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-rose-600 block mb-1">신체부하</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.physical.physicalStress} onChange={e => handleInputChange('physical', 'physicalStress', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-rose-600 block mb-1">정신부하</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.physical.mentalStress} onChange={e => handleInputChange('physical', 'mentalStress', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-rose-600 block mb-1">HRV 피로도</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.physical.fatigue} onChange={e => handleInputChange('physical', 'fatigue', e.target.value)} /></div>
                                        <div><label className="text-[11px] text-rose-600 block mb-1">심장안정</label><input type="number" step="0.1" className="w-full p-2 rounded border text-sm" value={data.physical.stability} onChange={e => handleInputChange('physical', 'stability', e.target.value)} /></div>
                                    </div>
                                    <div className="bg-white p-3 rounded-lg border border-rose-100">
                                        <div className="text-[11px] font-bold text-rose-700 mb-2">초음파 결과 (GREEN=양호, YELLOW=주의, ORANGE=위험)</div>
                                        <div className="grid grid-cols-3 gap-4">
                                            <div className="flex gap-2 items-center"><span className="text-xs w-10">아킬레스</span>
                                                <select className="p-1 border rounded text-[10px]" value={data.physical.usAchillesL} onChange={e=>handleInputChange('physical','usAchillesL',e.target.value)}><option>GREEN</option><option>YELLOW</option><option>ORANGE</option></select>
                                                <select className="p-1 border rounded text-[10px]" value={data.physical.usAchillesR} onChange={e=>handleInputChange('physical','usAchillesR',e.target.value)}><option>GREEN</option><option>YELLOW</option><option>ORANGE</option></select>
                                            </div>
                                            <div className="flex gap-2 items-center"><span className="text-xs w-10">무릎(슬)</span>
                                                <select className="p-1 border rounded text-[10px]" value={data.physical.usPatellarL} onChange={e=>handleInputChange('physical','usPatellarL',e.target.value)}><option>GREEN</option><option>YELLOW</option><option>ORANGE</option></select>
                                                <select className="p-1 border rounded text-[10px]" value={data.physical.usPatellarR} onChange={e=>handleInputChange('physical','usPatellarR',e.target.value)}><option>GREEN</option><option>YELLOW</option><option>ORANGE</option></select>
                                            </div>
                                            <div className="flex gap-2 items-center"><span className="text-xs w-10">족저근막</span>
                                                <select className="p-1 border rounded text-[10px]" value={data.physical.usPlantarL} onChange={e=>handleInputChange('physical','usPlantarL',e.target.value)}><option>GREEN</option><option>YELLOW</option><option>ORANGE</option></select>
                                                <select className="p-1 border rounded text-[10px]" value={data.physical.usPlantarR} onChange={e=>handleInputChange('physical','usPlantarR',e.target.value)}><option>GREEN</option><option>YELLOW</option><option>ORANGE</option></select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* A4 Report Container (11 Pages) */}
                    <div className="report-container flex flex-col items-center gap-8">
                        <PageCover data={data} />
                        
                        <Page1Mental data={data} />
                        <Page2MentalExtra data={data} />
                        <Page3MentalGuide data={data} />
                        
                        <Page4Physical data={data} />
                        <Page5HRV data={data} handleInputChange={handleInputChange} />
                        <Page6Ultrasound data={data} handleInputChange={handleInputChange} />
                        
                        <Page7Growth data={data} handleInputChange={handleInputChange} />
                        <Page8GrowthPhase data={data} />
                        <Page9GrowthCurves data={data} />
                        
                        <Page10Comprehensive data={data} handleInputChange={handleInputChange} />
                    </div>
                </div>
            );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
